<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3b82f6" />
    <meta
      name="description"
      content="DataSpark - AI-Powered Data Cleaning Assistant. Transform your messy datasets into clean, analysis-ready data with intelligent automation and advanced machine learning algorithms."
    />
    <meta name="keywords" content="data cleaning, AI, machine learning, data processing, CSV, data analysis, automation" />
    <meta name="author" content="DataSpark Team" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="DataSpark - AI-Powered Data Cleaning" />
    <meta property="og:description" content="Transform your messy datasets into clean, analysis-ready data with AI-powered precision." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dataspark.ai" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DataSpark - AI-Powered Data Cleaning" />
    <meta name="twitter:description" content="Transform your messy datasets into clean, analysis-ready data with AI-powered precision." />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico">
    
    <title>DataSpark - AI-Powered Data Cleaning Platform</title>
    
    <style>
      /* Critical CSS for initial loading */
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 50%, #0f1419 100%);
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      
      /* Loading screen styles */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 50%, #0f1419 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loader-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 2rem;
        color: #3b82f6;
        animation: logoSpin 2s ease-in-out infinite;
      }
      
      .loader-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 0.5rem;
      }
      
      .loader-subtext {
        font-size: 1rem;
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        animation: loaderSpin 1s linear infinite;
      }
      
      @keyframes logoSpin {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
      }
      
      @keyframes loaderSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .hide-loader {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Initial Loading Screen -->
    <div id="initial-loader" class="initial-loader">
      <svg class="loader-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
      </svg>
      <div class="loader-text">DataSpark</div>
      <div class="loader-subtext">Initializing AI-Powered Data Cleaning...</div>
      <div class="loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- PapaParse Library for CSV Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Hide loader after page loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('hide-loader');
            setTimeout(function() {
              loader.style.display = 'none';
            }, 500);
          }
        }, 1000); // Show loader for at least 1 second
      });
      
      // Performance monitoring
      if ('performance' in window) {
        window.addEventListener('load', function() {
          setTimeout(function() {
            const perfData = performance.getEntriesByType('navigation')[0];
            if (perfData) {
                console.log('Page Load Time:', perfData.loadEventEnd - perfData.loadEventStart, 'ms');
            }
          }, 0);
        });
      }
    </script>
  </body>
</html>
